server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Drop containers without an explicit opt-in label.
      # Set `logging=promtail` on services you want scraped (see compose label).
      - source_labels: ['__meta_docker_container_label_logging']
        regex: 'promtail'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      - source_labels: ['__meta_docker_container_label_app']
        target_label: 'app'
      - source_labels: ['__meta_docker_container_label_env']
        target_label: 'env'
    pipeline_stages:
      # Unwrap Docker JSON wrapper -> actual log line in `output`.
      - docker: {}
      # Skip backfill of pre-stack logs (Loki rejects entries older than
      # `reject_old_samples_max_age: 168h` with HTTP 400).
      - drop:
          older_than: 168h
          drop_counter_reason: too_old_for_loki
      # App log line itself is JSON (pino). Extract fields without
      # promoting high-cardinality ones (correlationId stays a field).
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            correlationId: correlationId
            req_id: req.id
            req_method: req.method
            req_url: req.url
            res_statusCode: res.statusCode
            err_type: err.type
            err_message: err.message
      - labels:
          level:
      # Map pino numeric levels to readable names so `level="error"` works.
      - template:
          source: level
          template: '{{ if eq .Value "10" }}trace{{ else if eq .Value "20" }}debug{{ else if eq .Value "30" }}info{{ else if eq .Value "40" }}warn{{ else if eq .Value "50" }}error{{ else if eq .Value "60" }}fatal{{ else }}{{ .Value }}{{ end }}'
      - labels:
          level:
      - timestamp:
          source: time
          format: UnixMs
          fallback_formats:
            - RFC3339Nano
            - RFC3339
