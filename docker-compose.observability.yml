services:
  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ../files/etc/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    # Loki not exposed publicly: Promtail + Grafana reach it via stack network.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:3.3.2
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ../files/etc/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - ../files/etc/grafana/provisioning/datasources/loki.yaml:/etc/grafana/provisioning/datasources/loki.yaml:ro
      - ../files/etc/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

volumes:
  loki-data:
  promtail-positions:
  grafana-data:
